name: docs-validate

on:
  push:
  pull_request:

jobs:
  docs-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements-dev.txt
      - run: python3 scripts/generate_docs.py --check
      - run: python3 scripts/validate_repo.py
      - run: python3 scripts/validate_traceability.py
