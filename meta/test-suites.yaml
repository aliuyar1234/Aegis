  - docs/threat-models/runtime-threat-model.md
  - docs/threat-models/browser-wedge-threats.md
  - docs/threat-models/enterprise-control-matrix.md
  - tests/security
  proves: Validates RBAC/ABAC catalogs, tenancy scoping, quotas, trust-boundary
    documentation, and canonical-table write prohibitions.
- id: TS-012
  title: Phase-gate scenario validation
  command: python3 scripts/run_phase_gate.py tests/phase-gates/internal-demo.yaml
