id: fault-injection-matrix
version: 1
faults:
- id: worker_crash
  class: execution_failure
  deterministic: true
  target_types:
  - python_worker
  - rust_sidecar
  expected_runtime_response: recovery_resume_or_adopt
- id: node_loss
  class: control_plane_failure
  deterministic: true
  target_types:
  - runtime_node
  expected_runtime_response: lease_adoption_and_tail_replay
- id: approval_timeout
  class: governance_timeout
  deterministic: true
  target_types:
  - approval_wait
  expected_runtime_response: approval_expired_and_session_wait_state_updated
- id: duplicate_callback
  class: transport_anomaly
  deterministic: true
  target_types:
  - worker_callback
  expected_runtime_response: duplicate_suppressed_or_uncertainty_classified
- id: browser_instability
  class: external_execution_instability
  deterministic: true
  target_types:
  - browser_context
  expected_runtime_response: degraded_mode_or_quarantine_with_evidence
