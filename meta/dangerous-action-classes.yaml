dangerous_action_classes:
- id: browser_write_low
  description: Low-risk browser mutation with reversible customer-neutral effect.
  default_decision: require_approval
- id: browser_write_medium
  description: Browser mutation affecting customer-visible state with bounded blast
    radius.
  default_decision: require_approval
- id: browser_write_high
  description: High-risk browser mutation with privilege, entitlement, or destructive
    impact.
  default_decision: deny_without_explicit_policy
- id: financial
  description: Financial or billing mutation.
  default_decision: require_approval
- id: destructive
  description: Deletion, revocation, or irreversible mutation.
  default_decision: require_approval
- id: pii_export
  description: Export or reveal sensitive customer data.
  default_decision: deny_without_explicit_policy
- id: external_message
  description: Outbound communication triggered by the runtime.
  default_decision: require_approval
