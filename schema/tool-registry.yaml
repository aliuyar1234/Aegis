registry_version: 1
tools:
- tool_id: browser.open
  version: v1
  description: Open a browser context for a session-owned browser workflow.
  executor_kind: python
  risk_class: browser_read
  dangerous_action_class: null
  idempotency_class: idempotent
  timeout_class: short
  input_schema_ref: schema/jsonschema/browser-open-input.schema.json
  output_schema_ref: schema/jsonschema/browser-open-output.schema.json
  default_retry_policy: fast_transient
  required_scopes:
  - browser.context.open
  artifact_expectations: []
  compensation_hook: null
  allow_in_tiers:
  - tier_a
  - tier_b
  - tier_c
- tool_id: browser.submit
  version: v1
  description: Submit a browser-backed mutation after policy, approval, and capability-token checks.
  executor_kind: python
  risk_class: browser_write
  dangerous_action_class: browser_write_medium
  idempotency_class: non_idempotent
  timeout_class: medium
  input_schema_ref: schema/jsonschema/browser-submit-input.schema.json
  output_schema_ref: schema/jsonschema/browser-submit-output.schema.json
  default_retry_policy: manual_only
  required_scopes:
  - browser.submit
  - artifact.capture
  artifact_expectations:
  - pre_write_screenshot
  - post_write_screenshot
  - dom_snapshot
  - trace
  compensation_hook: null
  allow_in_tiers:
  - tier_a
  - tier_b
  - tier_c
- tool_id: browser.navigate
  version: v1
  description: Navigate a browser context to a target page and capture read-oriented evidence.
  executor_kind: python
  risk_class: browser_read
  dangerous_action_class: null
  idempotency_class: idempotent
  timeout_class: medium
  input_schema_ref: schema/jsonschema/browser-navigate-input.schema.json
  output_schema_ref: schema/jsonschema/browser-navigate-output.schema.json
  default_retry_policy: fast_transient
  required_scopes:
  - browser.navigate
  - artifact.capture
  artifact_expectations:
  - screenshot
  - dom_snapshot
  compensation_hook: null
  allow_in_tiers:
  - tier_a
  - tier_b
  - tier_c
- tool_id: browser.click
  version: v1
  description: Click a browser element when policy allows a low-risk mutation path.
  executor_kind: python
  risk_class: browser_write
  dangerous_action_class: browser_write_low
  idempotency_class: non_idempotent
  timeout_class: short
  input_schema_ref: schema/jsonschema/browser-mutate-input.schema.json
  output_schema_ref: schema/jsonschema/browser-mutate-output.schema.json
  default_retry_policy: none
  required_scopes:
  - browser.click
  artifact_expectations:
  - screenshot
  compensation_hook: null
  allow_in_tiers:
  - tier_a
  - tier_b
  - tier_c
- tool_id: browser.delete
  version: v1
  description: Trigger a destructive browser mutation that must stay denied by default.
  executor_kind: python
  risk_class: browser_write
  dangerous_action_class: browser_write_high
  idempotency_class: non_idempotent
  timeout_class: medium
  input_schema_ref: schema/jsonschema/browser-mutate-input.schema.json
  output_schema_ref: schema/jsonschema/browser-mutate-output.schema.json
  default_retry_policy: none
  required_scopes:
  - browser.delete
  artifact_expectations:
  - screenshot
  compensation_hook: null
  allow_in_tiers:
  - tier_a
  - tier_b
  - tier_c
