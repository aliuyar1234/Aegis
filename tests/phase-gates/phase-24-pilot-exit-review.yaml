- id: reproducible-pilot-operations-bundle
  description: verify the pilot-operations evidence bundle is reproducible
  expected:
  - the bundle fails if any underlying phase-24 report fails
  evidence:
  - scripts/build_phase24_pilot_operations_evidence.py
proves:
- phase-24 pilot exit review is a reproducible operating decision surface
