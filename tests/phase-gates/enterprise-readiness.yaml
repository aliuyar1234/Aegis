  - docs/design-docs/retention-and-slo-policy.md
  - docs/runbooks/retention-backlog.md
- id: control-matrix
  description: verify enterprise control matrix and evidence bundle
  expected:
  - enterprise gate references concrete control docs and outputs
  - dedicated deployment evidence and acceptance checklist are explicit
  evidence:
  - meta/enterprise-control-matrix.yaml
  - meta/enterprise-acceptance-checklist.yaml
  - docs/threat-models/enterprise-control-matrix.md
  - tests/phase-gates/enterprise-readiness.yaml
- id: open-decisions
  description: verify bounded unresolved items remain explicit
  expected:
  - open decisions are bounded and explicitly justified
  - no hidden placeholder drift remains in the terminal phase
  evidence:
  - OPEN_DECISIONS.md
  - meta/repo-checks.yaml
proves:
- enterprise claims are backed by concrete repository assets
