name: Customer golden paths gate
objective: Validate that launch-ready customer workflows remain explicit, bounded, and evidence-backed.
fixtures:
- docs/exec-plans/active/PHASE-22-customer-launch-readiness.md
- docs/design-docs/customer-golden-paths.md
- docs/runbooks/customer-golden-path-execution.md
- meta/customer-golden-paths.yaml
- schema/jsonschema/customer-golden-paths.schema.json
- schema/jsonschema/customer-golden-path-report.schema.json
- scripts/run_phase22_customer_golden_paths.py
- tests/launch_readiness/test_phase22_customer_golden_paths_assets.py
- tests/phase-gates/phase-22-customer-golden-paths.yaml
tests:
- TS-059
acceptance:
- AC-099
steps:
- id: bounded-customer-workflows
  description: verify the launch workflows bind starter kits, deployment tracks, replay, and intervention
  expected:
